services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: qdrant
    ports:
      - "6333:6333"   # REST API + Web UI
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"   # OpenAI-compatible REST API
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    
  api:
    build:
      context: .                               
      dockerfile: ErrorAnalyserApi/Dockerfile
    container_name: error_log_analyzer_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Qdrant__Endpoint=http://qdrant:6333
      - Ollama__BaseUrl=http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - "5000:8080"   # Map host:container for HTTP
      - "5001:8081"   # Map host:container for HTTPS (if your app supports it)   
        
    volumes:
      - ./ErrorAnalyserApi/logs:/app/logs   

  web:    
    build:
      context: .
      dockerfile: ApiIntegrationMvc/Dockerfile
    container_name: api_integration_web
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Point the web app to APIs by service name (DNS provided by Compose)
      - Services__ErrorAnalyzer__BaseUrl=http://api:8080
      
    ports:
      - "7000:8080"  # browse http://localhost:7000
    depends_on:
      api:
        condition: service_started
     
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: error_analyzer_db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Bisp@123      
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost,1433 -U sa -P 'Bisp@123' -C -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s          
    volumes:
      - sql_data:/var/opt/mssql


volumes:
  sql_data:
  qdrant_data:
  ollama_data:
